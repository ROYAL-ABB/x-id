<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Data // Auto Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- High-compatibility version of Tesseract for offline/local file system support -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { background-color: #0b0f19; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
    </style>
</head>
<body class="text-gray-100 font-sans min-h-screen flex flex-col">

    <!-- Navbar -->
    <header class="border-b border-gray-800 bg-gray-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-wider text-cyan-400">X-<span class="text-white">DATA</span></h1>
            <span class="text-xs bg-cyan-950 text-cyan-400 px-3 py-1 rounded-full border border-cyan-800/50 font-mono">Local AI Scanner</span>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="max-w-7xl mx-auto px-4 py-6 flex-1 grid grid-cols-1 lg:grid-cols-12 gap-6 h-[calc(100vh-80px)] overflow-hidden">
        
        <!-- Left Panel: Dropzone & Status (4 Cols) -->
        <section class="lg:col-span-4 flex flex-col gap-4 h-full">
            
            <!-- Quick Search -->
            <div class="bg-gray-950 p-4 rounded-xl border border-gray-850 shadow-md">
                <input type="text" id="searchBar" class="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-cyan-500 transition" placeholder="🔍 Search records instantly...">
            </div>

            <!-- Smart Upload Box -->
            <div class="bg-gray-950 p-6 rounded-xl border border-gray-850 flex-1 flex flex-col justify-center items-center relative text-center">
                <input type="file" id="autoFile" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-20">
                
                <div id="dropzoneContent" class="space-y-4 pointer-events-none">
                    <div class="w-16 h-16 bg-cyan-950/40 text-cyan-400 border border-cyan-800/30 rounded-full flex items-center justify-center mx-auto text-2xl font-bold">
                        ↑
                    </div>
                    <div>
                        <p class="text-base font-bold text-white">Upload ID Document</p>
                        <p class="text-xs text-gray-400 mt-1">Drag and drop or click to scan image</p>
                    </div>
                </div>

                <!-- Processing Spinner Overlay -->
                <div id="scannerOverlay" class="absolute inset-0 bg-gray-950/90 hidden flex-col justify-center items-center p-6 rounded-xl z-30">
                    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-cyan-400 mb-4"></div>
                    <p class="text-sm font-bold text-cyan-400 tracking-wide uppercase font-mono">AI OCR Scanning...</p>
                    <p id="scanProgress" class="text-xs text-gray-400 mt-1">Reading pixels...</p>
                </div>
            </div>
        </section>

        <!-- Center Panel: Alphabetical List Index (3 Cols) -->
        <section class="lg:col-span-3 bg-gray-950 rounded-xl border border-gray-850 h-full flex flex-col overflow-hidden">
            <div class="p-4 border-b border-gray-900 flex justify-between items-center bg-gray-900/20">
                <h2 class="text-sm font-bold uppercase tracking-wider text-gray-400">Records</h2>
                <span id="indexCount" class="text-xs text-cyan-400 font-mono">0 Loaded</span>
            </div>
            <div id="azListContainer" class="flex-1 overflow-y-auto p-2 space-y-4">
                <!-- A-Z Auto Records go here -->
            </div>
        </section>

        <!-- Right Panel: Data Sheet Inspector (5 Cols) -->
        <section id="inspectorPanel" class="lg:col-span-5 bg-gray-950 rounded-xl border border-gray-850 h-full flex flex-col overflow-y-auto p-6 relative justify-center items-center text-gray-500">
            <div class="text-center">
                <p class="text-lg">📂 Digital Profile Engine</p>
                <p class="text-xs text-gray-600 mt-1">Upload an image file to trigger scanning operations.</p>
            </div>
        </section>

    </main>

    <script>
        const autoFile = document.getElementById('autoFile');
        const scannerOverlay = document.getElementById('scannerOverlay');
        const scanProgress = document.getElementById('scanProgress');
        const searchBar = document.getElementById('searchBar');
        const azListContainer = document.getElementById('azListContainer');
        const indexCount = document.getElementById('indexCount');
        const inspectorPanel = document.getElementById('inspectorPanel');

        let profiles = JSON.parse(localStorage.getItem('xdata_auto_profiles')) || [];
        let selectedProfileId = null;

        autoFile.addEventListener('change', (e) => {
            if (e.target.files.length === 0) return;
            
            const file = e.target.files[0];
            scannerOverlay.classList.remove('hidden');
            scanProgress.textContent = "Loading file...";
            
            const reader = new FileReader();
            reader.onloadend = function() {
                processDocumentImage(reader.result);
            };
            reader.readAsDataURL(file);
        });

        // Fixed Local Compatibility OCR Function
        async function processDocumentImage(base64Image) {
            try {
                scanProgress.textContent = "Initializing AI Engine...";
                
                // Uses clean implementation to prevent local file protocol blocking
                const result = await Tesseract.recognize(
                    base64Image,
                    'eng',
                    { logger: m => {
                        if(m.status === 'recognizing') {
                            scanProgress.textContent = `Analyzing text: ${Math.floor(m.progress * 100)}%`;
                        }
                    }}
                );
                
                parseExtractedText(result.data.text, base64Image);
            } catch (err) {
                console.error(err);
                alert("Scan failed to extract text automatically. Creating empty profile card instead.");
                parseExtractedText("", base64Image);
            } finally {
                scannerOverlay.classList.add('hidden');
                autoFile.value = '';
            }
        }

        function parseExtractedText(rawText, base64Image) {
            const lines = rawText.split('\n').map(l => l.trim()).filter(l => l.length > 2);
            
            let parsedName = "Unknown Profile";
            let parsedAge = "Unknown";
            let parsedPhone = "Not Found";
            let parsedLocation = "Detected on Document";

            // Filter out system document keywords to try and capture the person's name
            const cleanedLines = lines.filter(l => !/identity|card|republic|passport|driver|license|national/i.test(l));
            if(cleanedLines.length > 0) {
                parsedName = cleanedLines[0];
            }

            // Look for numbers that resemble ages
            const ageMatch = rawText.match(/(?:age|dob|born)[:\s]*([\d]{2})/i) || rawText.match(/\b([\d]{2})\b/);
            if(ageMatch) parsedAge = ageMatch[1];

            // Look for telephone combinations
            const phoneMatch = rawText.match(/(?:\+?[\d\-\s]{8,15})/);
            if(phoneMatch && phoneMatch[0].replace(/[\s\-]/g, '').length >= 8) {
                parsedPhone = phoneMatch[0].trim();
            }

            const autoProfile = {
                id: Date.now(),
                name: parsedName,
                dad: "Extracted on Target Asset",
                mom: "Extracted on Target Asset",
                grandpa: "Dynamic Link Pending",
                grandma: "Dynamic Link Pending",
                age: parsedAge,
                phone: parsedPhone,
                location: parsedLocation,
                image: base64Image,
                rawLog: rawText || "No readable text discovered on document face.",
                timestamp: new Date().toLocaleDateString()
            };

            profiles.push(autoProfile);
            localStorage.setItem('xdata_auto_profiles', JSON.stringify(profiles));
            
            renderIndex();
            selectProfile(autoProfile.id);
        }

        function renderIndex(filterText = '') {
            azListContainer.innerHTML = '';
            const query = filterText.toLowerCase();

            const filtered = profiles.filter(p => 
                p.name.toLowerCase().includes(query) || 
                p.rawLog.toLowerCase().includes(query)
            );
            
            indexCount.textContent = `${filtered.length} Cards`;

            if(filtered.length === 0) {
                azListContainer.innerHTML = `<div class="text-center text-xs text-gray-600 pt-6">Vault Empty</div>`;
                return;
            }

            filtered.sort((a, b) => a.name.localeCompare(b.name));

            const groups = {};
            filtered.forEach(p => {
                const firstLetter = p.name.charAt(0).toUpperCase();
                const cleanKey = /^[A-Z]$/.test(firstLetter) ? firstLetter : '#';
                if (!groups[cleanKey]) groups[cleanKey] = [];
                groups[cleanKey].push(p);
            });

            Object.keys(groups).sort().forEach(letter => {
                const block = document.createElement('div');
                block.className = "space-y-1";
                block.innerHTML = `<div class="text-xs font-bold font-mono text-cyan-500/60 border-b border-gray-900 px-1 pb-0.5">${letter}</div>`;
                
                groups[letter].forEach(profile => {
                    const btn = document.createElement('button');
                    const isSelected = profile.id === selectedProfileId;
                    btn.className = `w-full text-left px-3 py-2 rounded-lg text-sm truncate block transition ${isSelected ? 'bg-cyan-500 text-gray-950 font-bold' : 'bg-gray-900/50 hover:bg-gray-900 text-gray-300'}`;
                    btn.textContent = profile.name;
                    btn.onclick = () => selectProfile(profile.id);
                    block.appendChild(btn);
                });
                azListContainer.appendChild(block);
            });
        }

        function selectProfile(id) {
            selectedProfileId = id;
            const profile = profiles.find(p => p.id === id);
            renderIndex(searchBar.value);

            if (!profile) {
                inspectorPanel.innerHTML = `<div class="text-center text-gray-500"><p>No Profile Selected</p></div>`;
                return;
            }

            inspectorPanel.className = "lg:col-span-5 bg-gray-950 rounded-xl border border-gray-850 h-full flex flex-col p-6 overflow-y-auto";
            inspectorPanel.innerHTML = `
                <div class="flex justify-between items-start border-b border-gray-900 pb-4 mb-4">
                    <div>
                        <h2 class="text-xl font-black text-white tracking-wide">${profile.name}</h2>
                        <p class="text-[10px] text-gray-500 mt-0.5">Reference ID: <span class="font-mono text-cyan-400">${profile.id}</span></p>
                    </div>
                    <button onclick="deleteProfile(${profile.id})" class="text-xs text-red-400 bg-red-950/20 border border-red-900/40 px-2.5 py-1 rounded hover:bg-red-900 hover:text-white transition">Delete</button>
                </div>

                <div class="space-y-4 flex-1">
                    <div class="grid grid-cols-2 gap-3 bg-gray-900/30 p-4 rounded-xl border border-gray-900 text-xs">
                        <div>
                            <span class="block text-[10px] text-gray-500 uppercase">Extracted Age Data</span>
                            <span class="text-gray-200 font-medium">${profile.age}</span>
                        </div>
                        <div>
                            <span class="block text-[10px] text-gray-500 uppercase">Contact Link</span>
                            <span class="text-gray-200 font-mono">${profile.phone}</span>
                        </div>
                        <div class="col-span-2">
                            <span class="block text-[10px] text-gray-500 uppercase">Scanned Location Field</span>
                            <span class="text-gray-200">${profile.location}</span>
                        </div>
                    </div>

                    <div>
                        <span class="block text-[10px] font-mono uppercase tracking-wider text-cyan-500/70 mb-1.5">Attached Source ID</span>
                        <div class="border border-gray-900 rounded-xl overflow-hidden bg-black aspect-video flex items-center justify-center">
                            <img src="${profile.image}" alt="ID Document Viewer" class="w-full h-full object-contain">
                        </div>
                    </div>

                    <div>
                        <span class="block text-[10px] font-mono uppercase tracking-wider text-gray-500 mb-1.5">Raw Text Payload</span>
                        <div class="bg-gray-900 p-3 rounded-lg border border-gray-850 max-h-32 overflow-y-auto text-[11px] font-mono text-gray-400 whitespace-pre-wrap leading-relaxed">
                            ${profile.rawLog.replace(/</g, "&lt;").replace(/>/g, "&gt;")}
                        </div>
                    </div>
                </div>
            `;
        }

        window.deleteProfile = function(id) {
            if(confirm("Delete this card?")) {
                profiles = profiles.filter(p => p.id !== id);
                localStorage.setItem('xdata_auto_profiles', JSON.stringify(profiles));
                selectedProfileId = null;
                inspectorPanel.innerHTML = `
                    <div class="text-center">
                        <p class="text-lg">📂 Digital Profile Engine</p>
                        <p class="text-xs text-gray-600 mt-1">Upload an image file to trigger scanning operations.</p>
                    </div>
                `;
                renderIndex();
            }
        }

        searchBar.addEventListener('input', (e) => {
            renderIndex(e.target.value);
        });

        renderIndex();
    </script>
</body>
</html>
