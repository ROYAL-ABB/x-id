<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Data // ID Vault</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0b0f19;
        }
    </style>
</head>
<body class="text-gray-100 font-sans min-h-screen">

    <!-- Navbar -->
    <header class="border-b border-gray-800 bg-gray-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-wider text-cyan-400">X-<span class="text-white">DATA</span></h1>
            <span class="text-xs bg-gray-800 text-gray-400 px-2.5 py-1 rounded-full border border-gray-700">Local Vault</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8 grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <!-- Left Column: Upload Form -->
        <section class="md:col-span-1 bg-gray-950 p-6 rounded-2xl border border-gray-850 h-fit shadow-xl">
            <h2 class="text-xl font-bold mb-4 text-white">Upload New ID</h2>
            <form id="uploadForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Full Name</label>
                    <input type="text" id="idName" required class="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-cyan-500 transition" placeholder="John Doe">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Document Type</label>
                    <select id="idType" class="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-cyan-500 transition">
                        <option value="Identity Card">Identity Card</option>
                        <option value="Passport">Passport</option>
                        <option value="Driver License">Driver's License</option>
                        <option value="Other">Other Document</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">ID / Document Number</label>
                    <input type="text" id="idNumber" class="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-cyan-500 transition" placeholder="Optional">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Upload Document Image</label>
                    <div class="relative border-2 border-dashed border-gray-800 rounded-lg p-4 text-center hover:border-cyan-500 transition cursor-pointer bg-gray-900/50">
                        <input type="file" id="idFile" accept="image/*" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                        <p id="fileNameDisplay" class="text-sm text-gray-400">Click or drag image file here</p>
                    </div>
                </div>
                <button type="submit" class="w-full bg-cyan-500 hover:bg-cyan-600 text-gray-950 font-bold py-2.5 rounded-lg transition shadow-lg shadow-cyan-500/10">
                    Save Document
                </button>
            </form>
        </section>

        <!-- Right Column: Data View & Search -->
        <section class="md:col-span-2 space-y-6">
            <!-- Search Bar -->
            <div class="bg-gray-950 p-4 rounded-xl border border-gray-850 flex items-center shadow-md">
                <input type="text" id="searchBar" class="w-full bg-transparent text-lg text-white placeholder-gray-500 focus:outline-none" placeholder="🔍 Search records by name, type, or number...">
            </div>

            <!-- ID Gallery Grid -->
            <div>
                <h2 class="text-xl font-bold mb-4 text-white flex justify-between items-center">
                    Stored Records 
                    <span id="recordCount" class="text-sm font-normal text-gray-400">0 records</span>
                </h2>
                <div id="recordsContainer" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- Dynamic cards will append here -->
                </div>
            </div>
        </section>
    </main>

    <!-- JavaScript logic -->
    <script>
        const uploadForm = document.getElementById('uploadForm');
        const idFile = document.getElementById('idFile');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const searchBar = document.getElementById('searchBar');
        const recordsContainer = document.getElementById('recordsContainer');
        const recordCount = document.getElementById('recordCount');

        let db = JSON.parse(localStorage.getItem('xdata_vault')) || [];

        // File name update preview
        idFile.addEventListener('change', (e) => {
            if(e.target.files.length > 0) {
                fileNameDisplay.textContent = e.target.files[0].name;
                fileNameDisplay.classList.remove('text-gray-400');
                fileNameDisplay.classList.add('text-cyan-400', 'font-medium');
            }
        });

        // Form submission (Save ID)
        uploadForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const file = idFile.files[0];
            const reader = new FileReader();
            
            reader.onloadend = function() {
                const newRecord = {
                    id: Date.now(),
                    name: document.getElementById('idName').value,
                    type: document.getElementById('idType').value,
                    number: document.getElementById('idNumber').value || 'N/A',
                    image: reader.result, // base64 encoded string
                    dateAdded: new Date().toLocaleDateString()
                };
                
                db.push(newRecord);
                localStorage.setItem('xdata_vault', JSON.stringify(db));
                
                uploadForm.reset();
                fileNameDisplay.textContent = "Click or drag image file here";
                fileNameDisplay.className = "text-sm text-gray-400";
                
                renderRecords();
            }
            
            if (file) {
                reader.readAsDataURL(file);
            }
        });

        // Render records to interface
        function renderRecords(filterText = '') {
            recordsContainer.innerHTML = '';
            const query = filterText.toLowerCase();
            
            const filtered = db.filter(item => 
                item.name.toLowerCase().includes(query) || 
                item.type.toLowerCase().includes(query) || 
                item.number.toLowerCase().includes(query)
            );

            recordCount.textContent = `${filtered.length} record${filtered.length !== 1 ? 's' : ''}`;

            if(filtered.length === 0) {
                recordsContainer.innerHTML = `
                    <div class="col-span-full border border-dashed border-gray-800 rounded-xl p-8 text-center text-gray-500">
                        No matching documents found.
                    </div>
                `;
                return;
            }

            filtered.reverse().forEach(record => {
                const card = document.createElement('div');
                card.className = "bg-gray-950 border border-gray-850 rounded-xl overflow-hidden shadow-lg group hover:border-gray-700 transition flex flex-col";
                card.innerHTML = `
                    <div class="relative aspect-video bg-gray-900 flex items-center justify-center overflow-hidden border-b border-gray-850">
                        <img src="${record.image}" alt="ID Document" class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
                    </div>
                    <div class="p-4 flex-1 flex flex-col justify-between">
                        <div>
                            <div class="flex items-start justify-between gap-2">
                                <h3 class="font-bold text-white text-base truncate">${record.name}</h3>
                                <span class="text-xs font-semibold px-2 py-0.5 rounded bg-cyan-950 text-cyan-400 border border-cyan-900/50 whitespace-nowrap">${record.type}</span>
                            </div>
                            <p class="text-xs text-gray-400 mt-1">No: <span class="text-gray-200 font-mono">${record.number}</span></p>
                        </div>
                        <div class="mt-4 pt-3 border-t border-gray-900 flex justify-between items-center">
                            <span class="text-[10px] text-gray-500">Added: ${record.dateAdded}</span>
                            <button onclick="deleteRecord(${record.id})" class="text-xs text-red-400 hover:text-red-300 font-medium transition">Remove</button>
                        </div>
                    </div>
                `;
                recordsContainer.appendChild(card);
            });
        }

        // Delete function
        window.deleteRecord = function(id) {
            if(confirm("Are you sure you want to remove this record?")) {
                db = db.filter(item => item.id !== id);
                localStorage.setItem('xdata_vault', JSON.stringify(db));
                renderRecords(searchBar.value);
            }
        }

        // Real-time search handler
        searchBar.addEventListener('input', (e) => {
            renderRecords(e.target.value);
        });

        // Initialize view on load
        renderRecords();
    </script>
</body>
</html>
